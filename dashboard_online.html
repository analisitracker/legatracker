<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegatTracker – Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }

nav { background: #ffffff; border-bottom: 2px solid #b01c2e; padding: 0 24px; display: flex; align-items: center; gap: 14px; height: 54px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.logo { font-size: 17px; font-weight: 800; color: #1a1a2e; margin-right: 12px; }
.logo span { color: #60a5fa; }
.client-badge { background: #e8ebf8; color: #1d4ed8; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
.nav-right { margin-left: auto; }
.btn-logout { background: transparent; border: 1px solid #d0d5e0; color: #5a6070; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-logout:hover { border-color: #f87171; color: #f87171; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.page-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #7a8090; margin-bottom: 20px; }

.poz-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
.poz-tab { padding: 7px 18px; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid #d0d5e0; color: #5a6070; background: #eef0f5; transition: all .2s; }
.poz-tab.active { background: #b01c2e; border-color: #b01c2e; color: #fff; }

.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi { background: #ffffff; border: 1px solid #d0d5e0; border-radius: 10px; padding: 16px; position: relative; overflow: hidden; }
.kpi::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
.kpi.ni::before { background: #4da6ff; } .kpi.cu::before { background: #f97316; } .kpi.pb::before { background: #4ade80; } .kpi.ge::before { background: #c084fc; }
.kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #7a8090; margin-bottom: 8px; }
.kpi-val { font-size: 28px; font-weight: 700; margin-bottom: 3px; }
.kpi-val small { font-size: 14px; color: #7a8090; }
.kpi-meta { font-size: 11px; color: #7a8090; }
.kpi-stato { position: absolute; top: 12px; right: 12px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.s-ok { background: #14532d; color: #4ade80; }
.s-warn { background: #78350f; color: #fbbf24; }
.s-err { background: #7f1d1d; color: #f87171; }
.cv-bar { height: 5px; background: #eef0f4; border-radius: 3px; margin-top: 6px; overflow: hidden; }
.cv-fill { height: 100%; border-radius: 3px; }

.panel { background: #ffffff; border: 1px solid #d0d5e0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
.panel-hdr { padding: 12px 20px; background: #eef0f5; border-bottom: 1px solid #d0d5e0; }
.panel-title { font-weight: 700; font-size: 14px; color: #2a3a5a; }
.panel-body { padding: 20px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f4f6fa; color: #7a8090; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; text-align: center; }
td { padding: 9px 12px; text-align: center; border-bottom: 1px solid #1a2a3a; font-family: monospace; color: #5a6070; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #eef0f5; }
td.tdl { text-align: left; font-family: 'Segoe UI', sans-serif; font-weight: 700; color: #1a1a2e; }
td.out { color: #f87171 !important; font-weight: 700; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 9px; font-size: 11px; font-weight: 700; }

.comp-block { background: #ffffff; border: 1px solid #d0d5e0; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.comp-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.comp-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.comp-name { font-weight: 700; font-size: 15px; }
.comp-spec { font-size: 12px; color: #7a8090; }
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
.stat-box { background: #eef0f4; border-radius: 7px; padding: 10px 12px; }
.stat-lbl { font-size: 10px; color: #7a8090; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.stat-val { font-size: 16px; font-weight: 700; }
.nota-box { border-left: 3px solid; border-radius: 0 6px 6px 0; padding: 10px 14px; margin-top: 12px; font-size: 13px; line-height: 1.6; }

.next-panel { background: #ffffff; border: 1px solid #d0d5e0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
.next-title { font-weight: 700; font-size: 15px; margin-bottom: 14px; color: #2a3a5a; }
.countdown { font-size: 32px; font-weight: 800; margin: 10px 0 4px; }
.countdown.ok { color: #4ade80; }
.countdown.warn { color: #fbbf24; }
.countdown.err { color: #f87171; }

.no-access { text-align: center; padding: 80px 20px; }
.no-access h2 { color: #f87171; margin-bottom: 12px; }

/* NAV TABS */
.main-tabs { display: flex; gap: 6px; margin-bottom: 24px; border-bottom: 2px solid #d0d5e0; padding-bottom: 0; }
.main-tab { padding: 9px 20px; font-size: 13px; font-weight: 700; cursor: pointer; color: #7a8090; border-radius: 7px 7px 0 0; border: 1px solid transparent; border-bottom: none; transition: all .2s; margin-bottom: -2px; }
.main-tab.active { background: #ffffff; border-color: #d0d5e0; color: #b01c2e; border-bottom: 2px solid #f0f2f5; }
.main-tab:hover:not(.active) { color: #5a6070; }

/* DOCUMENTI */
.doc-section { margin-bottom: 28px; }
.doc-section-title { font-size: 13px; font-weight: 700; color: #60a5fa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #d0d5e0; }
.fornitore-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.fornitore-tab { padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; border: 1px solid #d0d5e0; color: #5a6070; background: #eef0f5; transition: all .2s; }
.fornitore-tab.active { background: #b01c2e; border-color: #b01c2e; color: #fff; }
.doc-cat-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.doc-cat-tab { padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; border: 1px solid #d0d5e0; color: #5a6070; background: transparent; transition: all .2s; }
.doc-cat-tab.active { background: #f0e8ea; border-color: #b01c2e; color: #b01c2e; }
.doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.doc-card { background: #ffffff; border: 1px solid #d0d5e0; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: all .2s; }
.doc-card:hover { border-color: #3b82f6; background: #eef0f5; }
.doc-icon { font-size: 28px; flex-shrink: 0; }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-meta { font-size: 11px; color: #7a8090; }
.doc-empty { color: #7a8090; font-size: 13px; padding: 20px; text-align: center; font-style: italic; }

@media(max-width:700px) { .kpi-row { grid-template-columns: 1fr 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<nav>
  <div class="logo">⚗️ <span>Lega</span>Tracker</div>
  <span class="client-badge" id="nav-badge">—</span>
  <div style="display:flex;gap:6px;margin-left:16px">
    <button class="main-tab active" id="tab-dashboard" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="main-tab" id="tab-acquisti" onclick="showTab('acquisti')">📦 Acquisti</button>
    <button class="main-tab" id="tab-documenti" onclick="showTab('documenti')">📁 Documenti</button>
    <button class="main-tab" id="tab-mercati" onclick="showTab('mercati')">📈 Mercati</button>
    <button class="main-tab" id="tab-guida" onclick="showTab('guida')">📖 Guida</button>
  </div>
  <div class="nav-right">
    <button class="btn-logout" onclick="logout()">🚪 Esci</button>
  </div>
</nav>

<div class="wrap" id="main-content">
  <div style="text-align:center;padding:60px 20px;color:#7a8090;">⏳ Caricamento...</div>
</div>
<div class="wrap" id="acq-content" style="display:none"></div>
<div class="wrap" id="mkt-content" style="display:none"></div>
<div class="wrap" id="doc-content" style="display:none"></div>
<div class="wrap" id="guida-content" style="display:none"></div>

<!-- Tooltip overlay -->
<div id="tooltip-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.25);position:relative">
    <button onclick="closeTooltip()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#999">✕</button>
    <div id="tooltip-title" style="font-weight:700;font-size:16px;margin-bottom:10px;color:#1a1a2e"></div>
    <div id="tooltip-body" style="font-size:14px;color:#5a6070;line-height:1.7"></div>
  </div>
</div>

<script>
// ─── SPECS & NOTES ────────────────────────────────────────────────────────
const SPECS = {
  Nichel:   { min: 0.010, max: 0.100, color: '#4da6ff', cls: 'ni' },
  Rame:     { min: 0.400, max: 0.850, color: '#f97316', cls: 'cu' },
  Piombo:   { min: null,  max: 0.100, color: '#4ade80', cls: 'pb' },
  Germanio: { min: 0.007, max: 0.015, color: '#c084fc', cls: 'ge' },
};
const COMPS = ['Nichel', 'Rame', 'Piombo', 'Germanio'];

const DEFAULT_NOTES = {
  Nichel: {
    high:     '⚠️ Ni elevato: probabile dissoluzione da componenti nichelati e/o PCB con finitura ENIG. Si consiglia di utilizzare una lega con minor contenuto di Nichel. Contattare il nostro supporto tecnico per consulenza.',
    low:      '📉 Ni in calo: il basso contenuto di Nichel potrebbe ridurre la fluidità della lega. Si consiglia di utilizzare una lega di ripristino con maggior contenuto di Nichel. Contattare il nostro supporto tecnico per consulenza.',
    unstable: '⚡ Ni instabile: i valori oscillano in modo irregolare nel tempo (CV% > 10%). Il processo non è stabile. Verificare la presenza discontinua di componenti nichelati o PCB con finitura ENIG. Contattare il nostro supporto tecnico per consulenza.',
    ok:       '✅ Nichel nella norma. Il valore è stabile. Continuare il monitoraggio periodico.'
  },
  Rame: {
    high:     '🔴 Cu elevato: possibile forte dissoluzione da PCB. Si consiglia l\'impiego di una lega con minor contenuto di rame. Contattare il nostro supporto tecnico per consulenza.',
    low:      '📉 Cu in calo: si consiglia l\'impiego di una lega con maggiore contenuto di rame. Contattare il nostro supporto tecnico per consulenza.',
    unstable: '⚡ Cu instabile: i valori oscillano in modo irregolare nel tempo (CV% > 10%). Contattare il nostro supporto tecnico per consulenza.',
    ok:       '✅ Rame nella norma. Il valore è stabile. Continuare il monitoraggio periodico.'
  },
  Piombo: {
    high:     '🚨 Pb oltre soglia RoHS! La presenza di Piombo oltre il limite legale richiede un intervento immediato. Identificare la fonte di contaminazione tra componenti, frame o fixtures. Contattare immediatamente il nostro supporto tecnico.',
    low:      '✅ Piombo nella norma. Il valore è al di sotto del limite RoHS. Nessun intervento necessario.',
    unstable: '⚡ Pb instabile: i valori oscillano in modo irregolare nel tempo (CV% > 10%). Possibile contaminazione episodica. Tracciare i lotti dei componenti e contattare il nostro supporto tecnico per consulenza.',
    ok:       '✅ Piombo nella norma. Il valore è stabile e al di sotto del limite RoHS. Continuare il monitoraggio periodico.'
  },
  Germanio: {
    high:     '🔴 Ge elevato: dosaggio eccessivo dell\'additivo. Verificare le aggiunte recenti e ridurre il dosaggio. Contattare il nostro supporto tecnico per consulenza.',
    low:      '📉 Ge in calo: il livello insufficiente di Germanio potrebbe ridurre le proprietà anti-ossidazione della lega. Si consiglia un intervento con una lega di ripristino. Contattare il nostro supporto tecnico per consulenza.',
    unstable: '⚡ Ge instabile: i valori oscillano in modo irregolare nel tempo (CV% > 10%). Si consiglia una fase di controllo per monitorare l\'andamento e definire un piano per il mantenimento nei valori ottimali. Contattare il nostro supporto tecnico per consulenza.',
    ok:       '✅ Germanio nella norma. Il livello è stabile e garantisce le proprietà anti-ossidazione della lega. Continuare il monitoraggio periodico.'
  }
};

// ─── STATS ───────────────────────────────────────────────────────────────
const mean = a => a.reduce((x,y)=>x+y,0)/a.length;
const std  = a => { const m=mean(a); return Math.sqrt(a.reduce((x,y)=>x+(y-m)**2,0)/Math.max(a.length-1,1)); };
const cv   = a => { const m=mean(a); return m ? std(a)/m*100 : 0; };
const cv3  = a => { const s=a.slice(-3); const m=mean(s); return m ? std(s)/m*100 : 0; };
const d3x  = a => a.length>=3 ? a[a.length-1]-a[a.length-3] : 0;

function stato(v, comp, cvp) {
  const s=SPECS[comp];
  if ((s.min&&v<s.min)||(s.max&&v>s.max)) return 'err';
  if (cvp>30) return 'warn';
  if (cvp>10) return 'warn';
  return 'ok';
}
function getNota(vals, comp, noteCliente) {
  const s=SPECS[comp]; const l=vals[vals.length-1]; const c=cv3(vals);
  const n = (noteCliente && noteCliente[comp]) ? noteCliente[comp] : DEFAULT_NOTES[comp];
  if (s.max&&l>s.max) return {t:n.high,cls:'err'};
  if (s.min&&l<s.min) return {t:n.low,cls:'warn'};
  if (c>30) return {t:n.unstable,cls:'warn'};
  return {t:n.ok,cls:'ok'};
}
function statolabel(s) { return {ok:'✅ OK',warn:'⚠️ ATTENZIONE',err:'🔴 FUORI SPEC'}[s]; }
function notaStyle(cls) {
  return {
    ok:   {border:'#4ade80',bg:'#0a2a14',color:'#86efac'},
    warn: {border:'#fbbf24',bg:'#2a1a00',color:'#fde68a'},
    err:  {border:'#f87171',bg:'#2a0a0a',color:'#fca5a5'},
  }[cls];
}
function cvColor(c) { return c<=10?'#4ade80':c<=30?'#fbbf24':'#f87171'; }
function badgeHtml(s) {
  const bg={ok:'#14532d',warn:'#78350f',err:'#7f1d1d'}[s];
  const col={ok:'#4ade80',warn:'#fbbf24',err:'#f87171'}[s];
  return `<span class="badge" style="background:${bg};color:${col}">${statolabel(s)}</span>`;
}

// ─── STATE ────────────────────────────────────────────────────────────────
let DB = null;
let activePoz = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────
window.onload = function() {
  const raw = sessionStorage.getItem('lt_data');
  const codice = sessionStorage.getItem('lt_cliente');
  if (!raw) {
    document.getElementById('main-content').innerHTML = `
      <div class="no-access">
        <h2>⚠️ Sessione scaduta</h2>
        <p style="color:#7a8090;margin-bottom:20px">Effettua nuovamente l'accesso.</p>
        <a href="index.html" style="color:#60a5fa">← Torna al login</a>
      </div>`;
    return;
  }
  DB = JSON.parse(raw);
  document.getElementById('nav-badge').textContent = DB.cliente || codice;
  renderDashboard();
};

function logout() {
  sessionStorage.removeItem('lt_data');
  sessionStorage.removeItem('lt_cliente');
  window.location.href = 'index.html';
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function getPozVals(poz, comp) { return poz.analisi.map(a=>a[comp]); }
function getPozDates(poz)       { return poz.analisi.map(a=>a.data); }

function renderDashboard() {
  const poz = DB.pozzetti[activePoz];
  const dates = getPozDates(poz);

  let html = `
    <div class="page-title">${DB.cliente} – ${poz.label}</div>
    <div class="page-sub">${DB.macchina} / ${DB.lega} &nbsp;·&nbsp; Ultima analisi: <strong>${dates[dates.length-1]}</strong></div>
    <div class="poz-tabs" id="poz-tabs">
      ${DB.pozzetti.map((p,i)=>`<div class="poz-tab ${i===activePoz?'active':''}" onclick="switchPoz(${i})">${p.label}</div>`).join('')}
    </div>`;

  // KPI
  html += `<div class="kpi-row">`;
  COMPS.forEach(comp => {
    const vals=getPozVals(poz,comp), last=vals[vals.length-1], s=SPECS[comp];
    const c=cv3(vals), st=stato(last,comp,c), dl=d3x(vals), avg=mean(vals);
    const cvPct=Math.min(c/20*100,100);
    html += `<div class="kpi ${s.cls}">
      <div class="kpi-stato s-${st}">${statolabel(st)}</div>
      <div class="kpi-label">${comp} (max: ${s.max?s.max.toFixed(3):'—'})</div>
      <div class="kpi-val" style="color:${st==='err'?'#c0392b':st==='warn'?'#d97706':'#1a1a2e'}">${last.toFixed(4)}<small> %</small></div>
      <div class="kpi-meta">Media: ${avg.toFixed(4)} | Δult.3: ${dl>=0?'+':''}${dl.toFixed(4)}</div>
      <div class="cv-bar"><div class="cv-fill" style="width:${cvPct}%;background:${cvColor(c)}"></div></div>
      <div style="font-size:10px;color:${cvColor(c)};margin-top:3px;">CV% ${c.toFixed(1)}%</div>
    </div>`;
  });
  html += `</div>`;

  // Prossima analisi
  if (DB.prossima_analisi) {
    const pa = DB.prossima_analisi;
    const oggi = new Date();
    let giorni = '—'; let countClass = 'ok';
    if (pa.data_calcolata) {
      const parts = pa.data_calcolata.split('/');
      const year = parts[2].length === 4 ? parseInt(parts[2]) : 2000 + parseInt(parts[2]);
      const dataTarget = new Date(year, parseInt(parts[1])-1, parseInt(parts[0]));
      const diff = Math.ceil((dataTarget - oggi) / (1000*60*60*24));
      giorni = diff;
      countClass = diff < 0 ? 'err' : diff <= 14 ? 'warn' : 'ok';
    }
    html += `<div class="next-panel">
      <div class="next-title">📅 Prossima analisi prevista</div>
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
        <div>
          <div style="font-size:12px;color:#7a8090;">Data prevista</div>
          <div style="font-size:22px;font-weight:700;color:#60a5fa">${pa.data_calcolata || '—'}</div>
        </div>
        <div>
          <div style="font-size:12px;color:#7a8090;">Giorni mancanti</div>
          <div class="countdown ${countClass}">${typeof giorni==='number'?(giorni<0?'SCADUTA':giorni+' gg'):giorni}</div>
        </div>
        ${pa.nota_promemoria?`<div style="flex:1;min-width:200px;background:#e8ebf0;border-radius:8px;padding:12px 14px;font-size:13px;color:#5a6070;border-left:3px solid #b01c2e">📝 ${pa.nota_promemoria}</div>`:''}
      </div>
    </div>`;
  }

  // Storico
  html += `<div class="panel"><div class="panel-hdr"><span class="panel-title">📋 Storico analisi</span></div><div style="overflow-x:auto"><table>`;
  html += `<thead><tr><th>Componente</th><th>Spec. Max</th>`;
  dates.forEach(d=>html+=`<th>${d}</th>`);
  html += `</tr></thead><tbody>`;
  COMPS.forEach(comp=>{
    const vals=getPozVals(poz,comp), s=SPECS[comp];
    html+=`<tr><td class="tdl">${comp}</td><td>${s.max?s.max.toFixed(4):'—'}</td>`;
    vals.forEach(v=>{ const out=(s.max&&v>s.max)||(s.min&&v<s.min); html+=`<td class="${out?'out':''}">${v.toFixed(4)}</td>`; });
    html+=`</tr>`;
  });
  html += `</tbody></table></div></div>`;

  // Grafici + note
  COMPS.forEach(comp=>{
    const vals=getPozVals(poz,comp), s=SPECS[comp];
    const last=vals[vals.length-1], c=cv3(vals), dl=d3x(vals), avg=mean(vals);
    const st=stato(last,comp,c), n=getNota(vals,comp,DB.note_correttive), ns=notaStyle(n.cls);
    html += `<div class="comp-block">
      <div class="comp-hdr">
        <div class="comp-dot" style="background:${s.color}"></div>
        <span class="comp-name">${comp}</span>
        <span class="comp-spec">max: ${s.max?s.max.toFixed(3):'—'}</span>
        <div style="margin-left:auto">${badgeHtml(st)}</div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-lbl">Ultimo valore</div><div class="stat-val" style="color:${st==='err'?'#c0392b':st==='warn'?'#d97706':'#1a1a2e'}">${last.toFixed(4)}%</div></div>
        <div class="stat-box"><div class="stat-lbl">Media storica <button onclick="showTooltip('media')" style="background:none;border:none;cursor:pointer;font-size:11px;color:#b01c2e;padding:0;margin-left:2px">ℹ️</button></div><div class="stat-val" style="color:#5a6070">${avg.toFixed(4)}%</div></div>

        <div class="stat-box"><div class="stat-lbl">Δ ultime 3 <button onclick="showTooltip('delta')" style="background:none;border:none;cursor:pointer;font-size:11px;color:#b01c2e;padding:0;margin-left:2px">ℹ️</button></div><div class="stat-val" style="color:${Math.abs(dl)>avg*0.05?'#d97706':'#5a6070'}">${dl>=0?'+':''}${dl.toFixed(4)}%</div></div>
      </div>
      ${buildSVG(vals, dates, s.color, s.max, s.min, comp)}
      <div class="nota-box" style="border-color:${ns.border};background:${ns.bg};color:${ns.color}">${n.t}</div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML = html;
}

function buildSVG(vals, dates, color, specMax, specMin, comp) {
  const W=600,H=110,PX=10,PY=8;
  const all=[...vals,specMax,specMin].filter(v=>v!=null);
  const minV=Math.min(...all)*0.96, maxV=Math.max(...all)*1.04;
  const n=vals.length;
  const xS=i=>PX+(i/(Math.max(n-1,1)))*(W-PX*2);
  const yS=v=>H-PY-((v-minV)/(maxV-minV||1))*(H-PY*2);
  let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:110px;display:block">
  <defs><linearGradient id="grad-${comp}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
  </linearGradient></defs>`;
  const areaPath=`M${xS(0)},${yS(vals[0])} `+vals.map((_,i)=>`L${xS(i)},${yS(vals[i])}`).join(' ')+` L${xS(n-1)},${H} L${xS(0)},${H} Z`;
  svg+=`<path d="${areaPath}" fill="url(#grad-${comp})"/>`;
  if (specMax) svg+=`<line x1="${PX}" y1="${yS(specMax)}" x2="${W-PX}" y2="${yS(specMax)}" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.8"/>`;
  if (specMin) svg+=`<line x1="${PX}" y1="${yS(specMin)}" x2="${W-PX}" y2="${yS(specMin)}" stroke="#f97316" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.8"/>`;
  const pts=vals.map((_,i)=>`${xS(i)},${yS(vals[i])}`).join(' ');
  svg+=`<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>`;
  vals.forEach((v,i)=>{
    const out=(specMax&&v>specMax)||(specMin&&v<specMin);
    svg+=`<circle cx="${xS(i)}" cy="${yS(v)}" r="4.5" fill="${out?'#ef4444':color}" stroke="#f0f2f5" stroke-width="1.5"/>`;
    svg+=`<text x="${xS(i)}" y="${yS(v)-8}" font-size="8" fill="${out?'#f87171':'#4a6080'}" text-anchor="middle">${v.toFixed(4)}</text>`;
  });
  svg+=`<text x="${xS(0)}" y="${H-1}" font-size="9" fill="#4a6080">${dates[0]}</text>`;
  svg+=`<text x="${xS(n-1)}" y="${H-1}" font-size="9" fill="#4a6080" text-anchor="end">${dates[n-1]}</text>`;
  svg+=`</svg>`;
  return svg;
}

function renderAcquisti() {
  const acquisti = (DB.acquisti || []).slice().sort((a,b)=>{
    const pd = s => { const p=s.split('/'); return new Date(p[2],p[1]-1,p[0]); };
    return pd(b.data) - pd(a.data);
  });

  // Calcola totali per prodotto
  const totali = {};
  acquisti.forEach(a => {
    if (!totali[a.prodotto]) totali[a.prodotto] = { kg: 0, n: 0 };
    totali[a.prodotto].kg += a.quantita_kg;
    totali[a.prodotto].n++;
  });

  let h = `<div class="page-title">📦 Storico Acquisti</div>
  <div class="page-sub">${DB.cliente} &nbsp;·&nbsp; ${acquisti.length} movimenti registrati</div>`;

  // KPI riepilogo per prodotto
  if (Object.keys(totali).length > 0) {
    h += `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px">`;
    Object.entries(totali).forEach(([prod, t]) => {
      h += `<div class="kpi" style="flex:1;min-width:180px">
        <div class="kpi-label">${prod}</div>
        <div class="kpi-val">${t.kg.toFixed(2)}<small> kg</small></div>
        <div class="kpi-meta">${t.n} consegn${t.n===1?'a':'e'} totali</div>
      </div>`;
    });
    h += `</div>`;
  }

  // Tabella
  h += `<div class="panel"><div class="panel-hdr"><span class="panel-title">📋 Dettaglio movimenti</span></div>
  <div style="overflow-x:auto"><table>
  <thead><tr><th>Data</th><th>Prodotto</th><th>Quantità (kg)</th></tr></thead><tbody>`;

  if (acquisti.length === 0) {
    h += `<tr><td colspan="3" style="text-align:center;color:#7a8090;padding:30px">Nessun acquisto registrato</td></tr>`;
  } else {
    acquisti.forEach(a => {
      h += `<tr>
        <td>${a.data}</td>
        <td class="tdl">${a.prodotto}</td>
        <td>${a.quantita_kg.toFixed(2)}</td>
      </tr>`;
    });
  }
  h += `</tbody></table></div></div>`;

  document.getElementById('acq-content').innerHTML = h;
}

      { nome: 'Lega SN100CS', file: 'Lega SN100CS.pdf' },
      { nome: 'PDS SAC305 StarCore234E', file: 'PDS_SAC305-StarCore234-E_EN.pdf' }
    ],
    certificazioni: [
      { nome: 'CP65 Statement (2024-11)', file: 'CP65 Statement (2024-11).pdf' },
      { nome: 'PFAS Information (2023-08)', file: 'PFAS Information (2023-08).pdf' },
      { nome: 'REACH and SVHC information (update 2025-11)', file: 'REACH and SVHC information (update 2025-11).pdf' },
      { nome: 'RMI_CMRT 6.5', file: 'RMI_CMRT_6.5.pdf' },
      { nome: 'RMI_EMRT 2.0', file: 'RMI_EMRT_2.0.pdf' },
      { nome: 'RoHS Certificate (2022-05)', file: 'RoHS Certificate (2022-05).pdf' }
    ]
  },
  'Emil Otto':   { schede_tecniche: [], schede_sicurezza: [], certificazioni: [] }
};

const CAT_LABELS = {
  schede_tecniche:  '📄 Schede Tecniche',
  schede_sicurezza: '⚠️ Schede di Sicurezza',
  certificazioni:   '🏅 Certificazioni'
};

let activeFornitore = 'Stannol';
let activeCat = 'schede_tecniche';

function renderDocumenti() {
  const clienteCode = sessionStorage.getItem('lt_cliente') || '';
  const rapporti = (DB.documenti && DB.documenti.rapporti) ? DB.documenti.rapporti : [];

  let h = `<div class="page-title">📁 Documenti</div>
  <div class="page-sub">Documentazione tecnica e rapporti di analisi</div>`;

  // ── Sezione comune ──
  h += `<div class="doc-section">
    <div class="doc-section-title">Documentazione Tecnica Prodotti</div>
    <div class="fornitore-tabs">`;
  Object.keys(DOCS_COMUNI).forEach(f => {
    h += `<div class="fornitore-tab ${f===activeFornitore?'active':''}" onclick="switchFornitore('${f}')">${f}</div>`;
  });
  h += `</div>`;

  // cat tabs
  h += `<div class="doc-cat-tabs">`;
  Object.entries(CAT_LABELS).forEach(([k,v]) => {
    h += `<div class="doc-cat-tab ${k===activeCat?'active':''}" onclick="switchCat('${k}')">${v}</div>`;
  });
  h += `</div>`;

  // doc cards
  const docs = DOCS_COMUNI[activeFornitore][activeCat] || [];
  if (docs.length === 0) {
    h += `<div class="doc-empty">Nessun documento disponibile in questa categoria.</div>`;
  } else {
    h += `<div class="doc-grid">`;
    docs.forEach(d => {
      const url = `${BASE}Documenti/comuni/${activeFornitore.replace(' ','_')}/${activeCat}/${d.file}`;
      h += `<a class="doc-card" href="${url}" target="_blank">
        <div class="doc-icon">📄</div>
        <div class="doc-info">
          <div class="doc-name">${d.nome}</div>
          <div class="doc-meta">${activeFornitore} · ${CAT_LABELS[activeCat].replace(/^. /,'')}</div>
        </div>
        <span style="color:#3b82f6;font-size:18px">↗</span>
      </a>`;
    });
    h += `</div>`;
  }
  h += `</div>`;

  // ── Rapporti cliente ──
  h += `<div class="doc-section">
    <div class="doc-section-title">📋 Rapporti di Analisi – ${DB.cliente}</div>`;
  if (rapporti.length === 0) {
    h += `<div class="doc-empty">Nessun rapporto disponibile.</div>`;
  } else {
    h += `<div class="doc-grid">`;
    rapporti.slice().reverse().forEach(r => {
      const url = `${BASE}Documenti/clienti/${clienteCode}/${r.file}`;
      h += `<a class="doc-card" href="${url}" target="_blank">
        <div class="doc-icon">📋</div>
        <div class="doc-info">
          <div class="doc-name">${r.nome}</div>
          <div class="doc-meta">${r.data}</div>
        </div>
        <span style="color:#3b82f6;font-size:18px">↗</span>
      </a>`;
    });
    h += `</div>`;
  }
  h += `</div>`;

  document.getElementById('doc-content').innerHTML = h;
}

function switchFornitore(f) { activeFornitore=f; renderDocumenti(); }
function switchCat(c) { activeCat=c; renderDocumenti(); }
</script>
</body>
</html>
