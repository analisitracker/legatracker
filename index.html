.login-wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 420px;
  padding: 20px;
  animation: fadeUp .5s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: translateY(0); }
}

.login-box {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 18px;
  padding: 36px 40px 32px;
  text-align: center;
  box-shadow: 0 24px 60px rgba(0,0,0,0.45);
}

.company-logo {
  width: 200px;
  max-width: 75%;
  margin-bottom: 4px;
}

.red-bar {
  width: 40px;
  height: 3px;
  background: var(--red);
  margin: 12px auto 16px;
  border-radius: 2px;
}

.portal-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.45);
  margin-bottom: 26px;
}

.form-group { text-align: left; margin-bottom: 16px; }

label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.45);
  margin-bottom: 7px;
}

input {
  width: 100%;
  background: rgba(255,255,255,0.85);
  border: 1.5px solid rgba(0,0,0,0.15);
  color: #1a1a2e;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Source Sans 3', sans-serif;
  outline: none;
  transition: border .2s;
}
input::placeholder { color: rgba(0,0,0,0.25); }
input:focus { border-color: var(--red); }

.btn {
  width: 100%;
  background: var(--red);
  color: #fff;
  border: none;
  padding: 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 8px;
  transition: background .2s;
}
.btn:hover { background: #8f1623; }

.error {
  background: rgba(127,29,29,0.1);
  color: #7f1d1d;
  border: 1px solid rgba(127,29,29,0.2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 14px;
  display: none;
  text-align: left;
}

.loading {
  color: rgba(0,0,0,0.45);
  font-size: 13px;
  margin-top: 14px;
  display: none;
}

.footer-note {
  margin-top: 24px;
  font-size: 11px;
  color: rgba(0,0,0,0.3);
  letter-spacing: .5px;
}

@media (max-width: 480px) {
  .login-box { padding: 32px 24px 28px; }
}
</style>
</head>

document.getElementById('f-pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
document.getElementById('f-cliente').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('f-pass').focus(); });
document.getElementById('f-cliente').addEventListener('input', function() { this.value = this.value.toUpperCase(); });
async function doLogin() {
  const codice = document.getElementById('f-cliente').value.trim().toUpperCase();
  const pass   = document.getElementById('f-pass').value.trim();
  const errEl  = document.getElementById('error-msg');
  const loadEl = document.getElementById('loading-msg');
  errEl.style.display = 'none';
  if (!codice || !pass) { errEl.textContent = '⚠️ Inserisci codice cliente e password.'; errEl.style.display = 'block'; return; }
  if (pass !== GLOBAL_PASSWORD) { errEl.textContent = '🔴 Password non corretta.'; errEl.style.display = 'block'; return; }
  if (!CLIENTI[codice]) { errEl.textContent = '🔴 Codice cliente non trovato.'; errEl.style.display = 'block'; return; }
  loadEl.style.display = 'block';
  try {
    const response = await fetch(CLIENTI[codice]);
    if (!response.ok) throw new Error('File non trovato');
    const data = await response.json();
    sessionStorage.setItem('lt_data', JSON.stringify(data));
    sessionStorage.setItem('lt_cliente', codice);
    window.location.href = 'dashboard_online.html';
  } catch(err) {
    loadEl.style.display = 'none';
    errEl.textContent = '🔴 Errore nel caricamento. Contatta il laboratorio.';
    errEl.style.display = 'block';
  }
}
</script>
